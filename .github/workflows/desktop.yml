name: Desktop packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  macos:
    name: macOS desktop package
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build Next app
        run: npm run build

      - name: Build macOS package
        run: npx electron-builder --mac --publish never

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pi-agent-web-macos
          path: |
            dist-desktop/*.dmg
            dist-desktop/*.zip

  windows:
    name: Windows desktop package
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build Next app
        run: npm run build

      - name: Build Windows package
        run: npx electron-builder --win --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pi-agent-web-windows
          path: |
            dist-desktop/*.exe
